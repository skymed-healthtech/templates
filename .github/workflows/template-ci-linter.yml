name: "Template CI - MegaLinter"

on:
  workflow_call:
    inputs:
      app_path:
        description: "Path to the app directory"
        required: true
        type: string
      megalinter_flavor:
        description: "MegaLinter flavor: all, cupcake, dart, dotnet, javascript, python, etc."
        required: false
        type: string
        default: "all"
      apply_fixes:
        description: "Auto-fix issues and commit (none, commit, pull_request)"
        required: false
        type: string
        default: "none"

jobs:
  megalinter:
    name: "MegaLinter - ${{ inputs.app_path }}"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: MegaLinter
        id: ml
        uses: oxsecurity/megalinter/flavors/${{ inputs.megalinter_flavor }}@v8
        env:
          GITHUB_TOKEN: ${{ github.token }}
          APPLY_FIXES: ${{ inputs.apply_fixes }}
          DEFAULT_WORKSPACE: /github/workspace/${{ inputs.app_path }}
          FILTER_REGEX_INCLUDE: "(${{ inputs.app_path }}/)"
          PRINT_ALPACA: false
          SHOW_ELAPSED_TIME: true
          FILEIO_REPORTER: false
          SARIF_REPORTER: true
          DISABLE_LINTERS: "SPELL_MISSPELL,SPELL_CSPELL,SPELL_PROSELINT,COPYPASTE_JSCPD,REPOSITORY_CHECKOV,REPOSITORY_DEVSKIM,REPOSITORY_DUSTILOCK,REPOSITORY_GITLEAKS,REPOSITORY_KICS,REPOSITORY_SECRETLINT,REPOSITORY_SEMGREP,REPOSITORY_SYFT,REPOSITORY_TRIVY"
          DART_DARTANALYZER_ARGUMENTS: "--fatal-infos --fatal-warnings"

      - name: Upload MegaLinter artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: megalinter-reports-${{ inputs.app_path }}
          path: megalinter-reports
          retention-days: 7
